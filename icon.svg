  <g fill="none" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round">
    <!-- File icons stacked -->
    <rect x="28" y="20" width="40" height="50" rx="4" fill="#2d2d2d" stroke="#4fc3f7"/>
    <line x1="36" y1="32" x2="60" y2="32"/>
    <line x1="36" y1="42" x2="56" y2="42"/>
