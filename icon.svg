    <!-- Second file (offset) -->
    <rect x="44" y="36" width="40" height="50" rx="4" fill="#2d2d2d" stroke="#4fc3f7"/>
    <line x1="52" y1="48" x2="76" y2="48"/>
    <line x1="52" y1="58" x2="72" y2="58"/>
    <line x1="52" y1="68" x2="68" y2="68"/>

    <!-- Third file (offset) -->
